services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      port: 3000
      MONGODB_URI: mongodb://mongo:27017/url-shortener
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:6
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
